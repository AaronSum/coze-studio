lockfileVersion: '9.0'

settings:
  autoInstallPeers: true
  excludeLinksFromLockfile: false

importers:

  .:
    dependencies:
      '@coze-workflow/test-run-form':
        specifier: workspace:*
        version: link:../form
      '@coze-workflow/test-run-shared':
        specifier: workspace:*
        version: link:../shared
      '@coze-workflow/test-run-trace':
        specifier: workspace:*
        version: link:../trace
    devDependencies:
      '@coze-arch/bot-typings':
        specifier: workspace:*
        version: link:../../../arch/bot-typings
      '@coze-arch/eslint-config':
        specifier: workspace:*
        version: link:../../../../config/eslint-config
      '@coze-arch/ts-config':
        specifier: workspace:*
        version: link:../../../../config/ts-config
      typescript:
        specifier: ~5.8.2
        version: 5.8.3

packages:

  typescript@5.8.3:
    resolution: {integrity: sha512-p1diW6TqL9L07nNxvRMM7hMMw4c5XOo/1ibL4aAIGmSAt9slTE1Xgw5KWuof2uTOvCg9BY7ZRi+GaF+7sfgPeQ==}
    engines: {node: '>=14.17'}
    hasBin: true

snapshots:

  typescript@5.8.3: {}
